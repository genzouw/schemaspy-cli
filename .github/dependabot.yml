# Dependabot configuration for automatic dependency updates
# Reference: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 5
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
    ignore:
      # v23.x 以降は Node.js 24 ランタイム要求のため、GitHub Actions runner が
      # node24 を正式サポートするまではメジャーアップデートを停止する。
      - dependency-name: 'DavidAnson/markdownlint-cli2-action'
        update-types: ['version-update:semver-major']

  # Node.js dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 10
    reviewers:
      - 'genzouw'
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    pull-request-branch-name:
      separator: '/'
