name: markdownlint

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/markdownlint.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/markdownlint.yml"
  # Actions allowlist 適用前の startup_failure や、依存 action 側の
  # 一時的な障害から復旧した際に、md ファイルを触らずに lint を再走させたい
  # ケースがあるため手動トリガーを用意する。
  workflow_dispatch:

concurrency:
  group: markdownlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    # 既存ドキュメントの MD040/MD031 違反を片付けるまでは赤検知にしない。
    # 整備完了後に continue-on-error を外して赤検知に切り替える。
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20
        with:
          config: ".markdownlint-cli2.jsonc"
          globs: "**/*.md"
